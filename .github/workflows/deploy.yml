name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout content repo
        uses: actions/checkout@v4
        with:
          path: content-repo
          fetch-depth: 0

      - name: Checkout quartz-base engine
        uses: actions/checkout@v4
        with:
          repository: simonelusetti/quartz-base
          path: quartz-engine
          fetch-depth: 0

      - name: Overlay content and config onto engine
        run: |
          rm -rf quartz-engine/content
          mkdir -p quartz-engine/content
          cp -r content-repo/content/. quartz-engine/content/
          cp content-repo/quartz.config.ts quartz-engine/quartz.config.ts
          cp content-repo/quartz.layout.ts quartz-engine/quartz.layout.ts

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: quartz-engine
        run: npm ci

      - name: Build Quartz
        working-directory: quartz-engine
        run: npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz-engine/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
